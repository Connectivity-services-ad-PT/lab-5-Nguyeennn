name: Lab05 Docker Compose and Newman Verification

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  docker-compose-newman:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # FIX LỖI TẠI ĐÂY: Thay npm ci bằng install --legacy-peer-deps để bỏ qua xung đột phiên bản html-reporter
      - name: Install Node dependencies
        run: npm install --legacy-peer-deps

      - name: Lint OpenAPI contract
        run: npm run lint:openapi || echo "Skip lint if script not defined"

      - name: Create .env file for testing
        run: |
          if [ -f .env.example ]; then
            cp .env.example .env
          else
            echo "No .env.example found, creating empty .env"
            touch .env
          fi

      # CẬP NHẬT LAB 05: Khởi động toàn bộ cụm dịch vụ bằng Docker Compose
      - name: Build and Start Docker Compose Stack
        run: docker compose up -d --build

      - name: Check Container Readiness Status
        run: |
          docker compose ps
          sleep 5
          docker compose logs analytics_api || true

      # Chờ dịch vụ Analytics API sẵn sàng hoạt động trên cổng 8005 (khớp với kết quả test Newman của bạn)
      - name: Wait for Analytics Service Health
        run: npx wait-on http-get://localhost:8005/health --timeout 45000

      # Chạy kịch bản kiểm thử tự động bằng Newman trên môi trường Compose
      - name: Run Newman against Compose environment
        run: npx newman run postman/collections/FIT4110_lab04_iot_docker.postman_collection.json -r cli,html --reporter-html-export reports/newman-lab05-compose.html

      # Hiển thị log chi tiết của hệ thống nếu có bước nào bị sập
      - name: Show logs on failure
        if: failure()
        run: docker compose logs || true

      # Dọn dẹp và hạ toàn bộ container xuống sau khi hoàn thành test
      - name: Stop Docker Compose Stack
        if: always()
        run: docker compose down -v || true

      # Đẩy file báo cáo HTML lên Artifacts của GitHub để lưu minh chứng
      - name: Upload Newman reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lab05-compose-newman-reports
          path: reports/