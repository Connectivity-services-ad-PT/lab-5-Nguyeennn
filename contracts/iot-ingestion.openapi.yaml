openapi: 3.0.3

info:
title: FIT4110 B5 - Analytics Service API
version: 1.0.0
description: |
Analytics Service của nhóm B5 dùng để tổng hợp dữ liệu,
thống kê và tích hợp với các service khác trong Demo Day.

servers:

* url: http://analytics_api:8000
  description: Docker Compose (class-net)

* url: http://localhost:8000
  description: Local Development

tags:

* name: Health
* name: Analytics
* name: Integrations

paths:

/health:
get:
tags:
- Health
summary: Health check
responses:
"200":
description: Service is healthy

/analytics/summary:
get:
tags:
- Analytics
summary: Tổng hợp thống kê dữ liệu cảm biến
responses:
"200":
description: Analytics summary

/analytics/by-device:
get:
tags:
- Analytics
summary: Thống kê số lượng bản ghi theo thiết bị
responses:
"200":
description: Device statistics

/integrations:
get:
tags:
- Integrations
summary: Danh sách service tích hợp
responses:
"200":
description: Integration information

/external/iot/health:
get:
tags:
- Integrations
summary: Kiểm tra trạng thái IoT Ingestion (B1)
responses:
"200":
description: IoT service healthy
"503":
description: IoT service unavailable

/external/iot/mock-check:
post:
tags:
- Integrations
summary: Gọi sang IoT Ingestion (B1)
requestBody:
required: true
content:
application/json:
schema:
type: object
responses:
"200":
description: IoT response
"503":
description: Cannot connect to IoT service

/external/access/health:
get:
tags:
- Integrations
summary: Kiểm tra trạng thái Access Gate (B3)
responses:
"200":
description: Access Gate healthy
"503":
description: Access Gate unavailable

/external/access/check:
post:
tags:
- Integrations
summary: Gọi Access Gate để kiểm tra quyền truy cập
requestBody:
required: true
content:
application/json:
schema:
type: object
responses:
"200":
description: Access Gate response
"503":
description: Cannot connect to Access Gate service

/external/camera/info:
get:
tags:
- Integrations
summary: Thông tin tích hợp Camera Stream (B2)
responses:
"200":
description: Camera integration pending

/external/core/info:
get:
tags:
- Integrations
summary: Thông tin tích hợp Core Business (B6)
responses:
"200":
description: Core Business integration pending
