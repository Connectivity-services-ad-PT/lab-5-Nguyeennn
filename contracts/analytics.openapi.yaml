openapi: 3.0.3
info:
  title: FIT4110 B5 - Analytics Service API
  version: 1.0.0
  description: Analytics Service của nhóm B5 dùng để phân tích và tổng hợp dữ liệu.
  contact:
    name: Team B5 - Analytics
    email: nguyennguyen10122005@gmail.com
servers:
  - url: http://analytics_api:8000
    description: Mạng nội bộ container (class-net / team-internal)
  - url: http://localhost:8005
    description: Cổng ánh xạ ngoài thực tế của Team Analytics (Lab 05)
tags:
  - name: Health
  - name: Analytics
  - name: Integrations

paths:
  /health:
    get:
      tags:
        - Health
      summary: Health check dịch vụ tích hợp kiểm tra sâu Database
      operationId: getHealthCheck
      description: Kiểm tra tình trạng hoạt động của service và kết nối database.
      responses:
        "200":
          description: Dịch vụ đang hoạt động bình thường
          content:
            application/json:
              schema:
                type: object
                required:
                  - status
                  - service
                  - version
                properties:
                  status:
                    type: string
                    example: "ok"
                  service:
                    type: string
                    example: "analytics-api"
                  version:
                    type: string
                    example: "v0.1.0-team-analytics"

  /analytics/summary:
    get:
      tags:
        - Analytics
      summary: Tổng hợp thống kê dữ liệu cảm biến
      operationId: getAnalyticsSummary
      description: Trả về các chỉ số thống kê tổng hợp từ dữ liệu cảm biến.
      responses:
        "200":
          description: Kết quả tổng hợp dữ liệu
          content:
            application/json:
              schema:
                type: object
                required:
                  - total_records
                  - avg_value
                properties:
                  total_records:
                    type: integer
                    example: 3
                  avg_value:
                    type: number
                    format: float
                    example: 41.8
                  min_value:
                    type: number
                    format: float
                    example: 28.5
                  max_value:
                    type: number
                    format: float
                    example: 65.2
        "500":
          description: Lỗi kết nối cơ sở dữ liệu nội bộ

  /analytics/by-device:
    get:
      tags:
        - Analytics
      summary: Thống kê số lượng bản ghi phân loại theo thiết bị
      responses:
        "200":
          description: Danh sách thống kê thiết bị thành công
          content:
            application/json:
              schema:
                type: object
                required:
                  - items
                properties:
                  items:
                    type: array
                    items:
                      type: object
                      required:
                        - device_id
                        - total_readings
                      properties:
                        device_id:
                          type: string
                          example: "SENSOR-DHT22-01"
                        total_readings:
                          type: integer
                          example: 12
        "500":
          description: Lỗi truy vấn cơ sở dữ liệu

  /integrations:
    get:
      tags:
        - Integrations
      summary: Danh sách đường dẫn (URL) thực tế của các dịch vụ tích hợp
      responses:
        "200":
          description: Đồng bộ hóa chính xác với định dạng trả về của main.py
          content:
            application/json:
              schema:
                type: object
                required:
                  - iot_ingestion
                  - access_gate
                  - camera_stream
                  - core_business
                properties:
                  iot_ingestion:
                    type: string
                    example: "http://iot-ingestion-b1:8000"
                  access_gate:
                    type: string
                    example: "http://team-gate-api:8000"
                  camera_stream:
                    type: string
                    example: "http://camera-stream:8000"
                  core_business:
                    type: string
                    example: "http://core-business:8000"

  /external/iot/health:
    get:
      tags:
        - Integrations
      summary: Kiểm tra trạng thái hoạt động của IoT Ingestion (B1)
      responses:
        "200":
          description: IoT service trực tuyến và phản hồi tốt
        "503":
          description: Dịch vụ đối tác không phản hồi hoặc mất kết nối

  /external/iot/mock-check:
    post:
      tags:
        - Integrations
      summary: Đẩy dữ liệu mô phỏng sang IoT Ingestion qua kênh bảo mật
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IoTDataPayload'
      responses:
        "200":
          description: IoT Ingestion nhận dữ liệu thành công
          content:
            application/json:
              schema:
                type: object
                required:
                  - success
                  - message
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Data ingested successfully"
        "401":
          description: Lỗi xác thực mã Token bảo mật
        "503":
          description: Không thể kết nối tới dịch vụ mạng đích

  /external/access/health:
    get:
      tags:
        - Integrations
      summary: Kiểm tra trạng thái Access Gate (B3)
      responses:
        "200":
          description: Phân hệ Access Gate hoạt động bình thường
        "503":
          description: Không kết nối được tới Access Gate

  /external/access/check:
    post:
      tags:
        - Integrations
      summary: Yêu cầu Access Gate xác thực phân quyền cửa
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccessCheckRequest'
      responses:
        "200":
          description: Phản hồi hợp lệ từ máy chủ Access Gate
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccessCheckResponse'
        "401":
          description: Mã authToken gửi kèm không hợp lệ
        "503":
          description: Lỗi liên kết dịch vụ Access Gate

  /external/access/logs:
    get:
      tags:
        - Integrations
      summary: Trích xuất lịch sử log ra vào từ Access Gate (B3)
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Danh sách logs được lấy thành công
          content:
            application/json:
              schema:
                type: object
                required:
                  - items
                properties:
                  items:
                    type: array
                    items:
                      type: object
                      required:
                        - employee_id
                        - gate_id
                        - action
                        - timestamp
                      properties:
                        employee_id:
                          type: string
                          example: "EMP-1024"
                        gate_id:
                          type: string
                          example: "GATE-MAIN-01"
                        action:
                          type: string
                          example: "ENTRY"
                        timestamp:
                          type: string
                          format: date-time
                          example: "2026-06-09T13:46:12Z"
        "503":
          description: Lỗi kết nối dịch vụ đối tác

  /external/camera/info:
    get:
      tags:
        - Integrations
      summary: "[STUB] Thông tin giữ chỗ liên kết Camera Stream (B2)"
      responses:
        "202":
          description: Luồng dữ liệu đang ở trạng thái chờ tích hợp mạng
          content:
            application/json:
              schema:
                type: object
                required:
                  - status
                  - message
                  - service_url
                properties:
                  status:
                    type: string
                    example: "pending"
                  message:
                    type: string
                    example: "Waiting for Camera Stream contract"
                  service_url:
                    type: string
                    example: "http://camera-stream:8000"

  /external/core/info:
    get:
      tags:
        - Integrations
      summary: "[STUB] Thông tin giữ chỗ liên kết Core Business (B6)"
      responses:
        "202":
          description: Kênh kết nối báo cáo đang ở trạng thái chờ tích hợp mạng
          content:
            application/json:
              schema:
                type: object
                required:
                  - status
                  - message
                  - service_url
                properties:
                  status:
                    type: string
                    example: "pending"
                  message:
                    type: string
                    example: "Waiting for Core Business contract"
                  service_url:
                    type: string
                    example: "http://core-business:8000"

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: Nhập mã mã token xác thực (Mặc định: local-dev-token)

  schemas:
    IoTDataPayload:
      type: object
      required:
        - device_id
        - temperature
        - humidity
      properties:
        device_id:
          type: string
          example: "SENSOR-DHT22-01"
        temperature:
          type: number
          format: float
          example: 28.5
        humidity:
          type: number
          format: float
          example: 60.0
        timestamp:
          type: string
          format: date-time
          example: "2026-06-09T13:45:00Z"

    AccessCheckRequest:
      type: object
      required:
        - card_uid
        - gate_id
      properties:
        card_uid:
          type: string
          example: "A3B2C1D0"
        gate_id:
          type: string
          example: "GATE-MAIN-01"

    AccessCheckResponse:
      type: object
      required:
        - is_allowed
        - employee_name
        - timestamp
      properties:
        is_allowed:
          type: boolean
          example: true
        employee_name:
          type: string
          example: "Nguyen Van A"
        timestamp:
          type: string
          format: date-time
          example: "2026-06-09T13:46:12Z"