version: '3.8'

services:
  analytics_db:
    image: postgres:15-alpine
    container_name: analytics_db
    environment:
      POSTGRES_USER: analytics_user
      POSTGRES_PASSWORD: analytics_password
      POSTGRES_DB: analytics
    volumes:
      - analytics_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - team-internal
    healthcheck:
      # Fix lỗi cú pháp check biến môi trường nội bộ của Postgres
      test: ["CMD-SHELL", "pg_isready -U analytics_user -d analytics"]
      interval: 5s       # Giảm thời gian quét xuống để báo trạng thái nhanh hơn
      timeout: 3s
      retries: 5
      start_period: 5s

  ai-service:
    image: nginx:alpine
    container_name: fit4110-ai-lab05
    command: /bin/sh -c "echo 'server { listen 9000; location /health { return 200 \"{\\\"status\\\":\\\"ok\\\",\\\"service\\\":\\\"ai-service\\\"}\"; add_header Content-Type application/json; } location /predict { return 200 \"{\\\"objects\\\":[\\\"person\\\",\\\"bicycle\\\"],\\\"confidence\\\":[0.98,0.85]}\"; add_header Content-Type application/json; } }' > /etc/nginx/conf.d/default.conf && nginx -g 'daemon off;'"
    ports:
      - "9000:9000"
    networks:
      - team-internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  iot-ingestion:
    image: nginx:alpine
    container_name: iot-ingestion-b1
    command: /bin/sh -c "echo 'server { listen 8000; location /health { return 200 \"{\\\"status\\\":\\\"healthy\\\"}\"; add_header Content-Type application/json; } }' > /etc/nginx/conf.d/default.conf && nginx -g 'daemon off;'"
    networks:
      - team-internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  access-gate:
    image: nginx:alpine
    container_name: team-gate-api
    command: /bin/sh -c "echo 'server { listen 8000; location /health { return 200 \"{\\\"status\\\":\\\"healthy\\\"}\"; add_header Content-Type application/json; } }' > /etc/nginx/conf.d/default.conf && nginx -g 'daemon off;'"
    networks:
      - team-internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  camera-stream:
    image: nginx:alpine
    container_name: camera-stream
    command: /bin/sh -c "echo 'server { listen 8000; location /health { return 200 \"{\\\"status\\\":\\\"healthy\\\"}\"; add_header Content-Type application/json; } }' > /etc/nginx/conf.d/default.conf && nginx -g 'daemon off;'"
    networks:
      - team-internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  core-business:
    image: nginx:alpine
    container_name: core-business
    command: /bin/sh -c "echo 'server { listen 8000; location /health { return 200 \"{\\\"status\\\":\\\"healthy\\\"}\"; add_header Content-Type application/json; } }' > /etc/nginx/conf.d/default.conf && nginx -g 'daemon off;'"
    networks:
      - team-internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  analytics_api:
    build:
      context: .
      dockerfile: Dockerfile.analytics
    container_name: analytics_api
    depends_on:
      analytics_db:
        condition: service_healthy
    environment:
      SERVICE_NAME: "analytics-api"
      SERVICE_VERSION: "v0.1.0-team-analytics"
      # Chỉ định cấu hình cứng chính xác để vượt qua Deep Health Check
      DB_HOST: "analytics_db"
      DB_PORT: 5432
      DB_NAME: "analytics"
      DB_USER: "analytics_user"
      DB_PASSWORD: "analytics_password"
      # URL Endpoint liên phân hệ mạng nội bộ
      IOT_SERVICE_URL: "http://iot-ingestion-b1:8000"
      ACCESS_GATE_URL: "http://team-gate-api:8000"
      CAMERA_SERVICE_URL: "http://camera-stream:8000"
      CORE_SERVICE_URL: "http://core-business:8000"
      AUTH_TOKEN: ${AUTH_TOKEN:-local-dev-token}
    ports:
      - "8005:8000"
    networks:
      - team-internal
      - class-net

volumes:
  analytics_data:

networks:
  team-internal:
    driver: bridge
  class-net:
    external: true