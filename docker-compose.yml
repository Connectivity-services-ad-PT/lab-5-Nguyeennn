services:
  analytics_db:
    image: postgres:15-alpine
    container_name: analytics_db

    environment:
      POSTGRES_DB: analytics
      POSTGRES_USER: analytics_user
      POSTGRES_PASSWORD: analytics_password

    volumes:
      - analytics_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql

    networks:
      - team-internal

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U analytics_user -d analytics"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

    restart: unless-stopped

  analytics_api:
    build:
      context: .
      dockerfile: Dockerfile.analytics

    container_name: analytics_api

    depends_on:
      analytics_db:
        condition: service_healthy

    env_file:
      - .env.example

    environment:
      DB_HOST: analytics_db
      DB_PORT: 5432
      DB_NAME: analytics
      DB_USER: analytics_user
      DB_PASSWORD: analytics_password

    ports:
      - "8000:8000"

    networks:
      - team-internal
      - class-net

    restart: unless-stopped

    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  analytics_data:

networks:
  team-internal:
    driver: bridge

  class-net:
    external: true